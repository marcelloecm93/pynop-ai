# Minimal pynop config — see the project README for the full reference.
#
# Run with:
#     pip install pynop-ai
#     guardrails hub install hub://guardrails/detect_pii
#     export OPENAI_API_KEY=sk-...
#     python examples/basic_openai.py

llm:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}

guards:
  input:
    on_guard_fail: include_reason
    guards:
      - type: guardrails_ai
        validators:
          - name: DetectPII
            on_fail: exception
            pii_entities:
              - EMAIL_ADDRESS
              - PHONE_NUMBER
              - US_SSN
              - CREDIT_CARD
  output:
    on_guard_fail: reject
    guards: []     # add output validators here when ready

tracing:
  enabled: false   # flip to true and set LANGFUSE_* env vars to record traces
