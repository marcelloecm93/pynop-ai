models:
  - type: main
    engine: openai
    model: gpt-4o-mini

rails:
  output:
    flows:
      - self check output

prompts:
  - task: self_check_output
    content: |
      Your task is to determine if the bot response contains harmful, toxic, or inappropriate content.
      If it does, say 'Yes'. Otherwise say 'No'.

      Bot response: "{{ bot_response }}"
      Answer:
