name: integration tests

on:
  workflow_dispatch:
  schedule:
    # Nightly at 04:00 UTC
    - cron: "0 4 * * *"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: integration pytest (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (core + dev + all extras)
        run: uv sync --all-extras

      - name: Install Guardrails Hub validators
        env:
          GUARDRAILS_TOKEN: ${{ secrets.GUARDRAILS_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          uv run guardrails configure --token "$GUARDRAILS_TOKEN" --disable-metrics --disable-remote-inferencing
          uv run guardrails hub install hub://guardrails/detect_pii
          uv run guardrails hub install hub://guardrails/toxic_language

      - name: Run integration tests
        env:
          PYNOP_INTEGRATION: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: uv run pytest tests/integration -q
